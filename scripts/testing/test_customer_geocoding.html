<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Customer Geocoding Flow</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
        .info { background-color: #d1ecf1; }
        input, button { padding: 5px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Test Customer Geocoding Flow</h1>
    
    <div>
        <h3>Step 1: Customer Enters Manual Address</h3>
        <input type="text" id="addressInput" style="width: 400px;" 
               value="K.R. Mangalam University, Badshahpur Sohna Rd, Gurugram">
        <button onclick="testCustomerGeocoding()">Test Customer Geocoding</button>
        <div id="customerResult"></div>
    </div>
    
    <div>
        <h3>Step 2: Submit Service Request</h3>
        <button onclick="testServiceRequest()">Simulate Service Request Submit</button>
        <div id="submitResult"></div>
    </div>
    
    <div>
        <h3>Step 3: Provider View (Distance Calculation)</h3>
        <button onclick="testProviderView()">Test Provider Distance Calculation</button>
        <div id="providerResult"></div>
    </div>

    <script>
        // Simulate the customer geocoding process
        async function geocodeWithMapsCo(address) {
            const apiKey = '69c7572eea0e4591472196pce879a88';
            
            // First try the direct address
            const response = await fetch(
                `https://geocode.maps.co/search?q=${encodeURIComponent(address)}&api_key=${apiKey}`
            );

            if (!response.ok) {
                throw new Error('geocode.maps.co API request failed');
            }

            const data = await response.json();
            
            if (data && data.length > 0) {
                const result = data[0];
                return {
                    ...result,
                    latitude: parseFloat(result.lat),
                    longitude: parseFloat(result.lon)
                };
            }
            
            // Fallback searches
            console.log('🔄 No direct results, trying fallback searches...');
            
            const fallbackSearches = [
                {
                    condition: (addr) => addr.toLowerCase().includes('mangalam') && addr.toLowerCase().includes('university'),
                    queries: ['K.R. Mangalam World School Gurugram', 'Mangalam World School Gurugram', 'K.R. Mangalam School Gurugram']
                }
            ];
            
            for (const fallback of fallbackSearches) {
                if (fallback.condition(address)) {
                    console.log('🔍 Trying fallback queries for:', address);
                    
                    for (const query of fallback.queries) {
                        console.log('🔍 Trying fallback query:', query);
                        
                        try {
                            const fallbackResponse = await fetch(
                                `https://geocode.maps.co/search?q=${encodeURIComponent(query)}&api_key=${apiKey}`
                            );
                            
                            if (fallbackResponse.ok) {
                                const fallbackData = await fallbackResponse.json();
                                
                                if (fallbackData && fallbackData.length > 0) {
                                    const result = fallbackData[0];
                                    console.log('✅ Fallback search successful:', query, result);
                                    return {
                                        ...result,
                                        latitude: parseFloat(result.lat),
                                        longitude: parseFloat(result.lon),
                                        fallback_query_used: query,
                                        fallback_match: true
                                    };
                                }
                            }
                        } catch (error) {
                            console.warn(`❌ Fallback query failed: ${query}`, error);
                            continue;
                        }
                    }
                }
            }
            
            throw new Error('No results found in geocode.maps.co and fallback searches');
        }

        async function testCustomerGeocoding() {
            const address = document.getElementById('addressInput').value;
            const resultDiv = document.getElementById('customerResult');
            
            resultDiv.innerHTML = '<div class="info">Testing customer geocoding...</div>';
            
            try {
                console.log('🔍 Customer geocoding address:', address);
                const geocodedLocation = await geocodeWithMapsCo(address);
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h4>✅ Customer Geocoding Successful!</h4>
                        <p><strong>Input Address:</strong> ${address}</p>
                        <p><strong>Latitude:</strong> ${geocodedLocation.latitude}</p>
                        <p><strong>Longitude:</strong> ${geocodedLocation.longitude}</p>
                        <p><strong>Display Name:</strong> ${geocodedLocation.display_name}</p>
                        ${geocodedLocation.fallback_query_used ? `<p><strong>Fallback Used:</strong> ${geocodedLocation.fallback_query_used}</p>` : ''}
                        <p><strong>Next:</strong> These coordinates will be sent to backend</p>
                    </div>
                `;
                
                // Store for next step
                window.customerCoords = geocodedLocation;
                console.log('✅ Customer geocoded coordinates:', geocodedLocation);
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Customer Geocoding Failed</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
                console.error('❌ Customer geocoding error:', error);
            }
        }

        async function testServiceRequest() {
            const resultDiv = document.getElementById('submitResult');
            
            if (!window.customerCoords) {
                resultDiv.innerHTML = '<div class="error">❌ Please test customer geocoding first</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="info">Simulating service request submission...</div>';
            
            // Simulate the service request data that would be sent
            const requestData = {
                customer_id: 27,
                service_name: "Electrical",
                service_category: "Electrical",
                address: document.getElementById('addressInput').value,
                latitude: window.customerCoords.latitude,
                longitude: window.customerCoords.longitude,
                location_type: "manual"
            };
            
            resultDiv.innerHTML = `
                <div class="success">
                    <h4>✅ Service Request Data Prepared</h4>
                    <p><strong>Address:</strong> ${requestData.address}</p>
                    <p><strong>Latitude:</strong> ${requestData.latitude}</p>
                    <p><strong>Longitude:</strong> ${requestData.longitude}</p>
                    <p><strong>Location Type:</strong> ${requestData.location_type}</p>
                    <p><strong>Note:</strong> This data would be sent to backend and stored in database</p>
                </div>
            `;
            
            console.log('📝 Service request data:', requestData);
        }

        async function testProviderView() {
            const resultDiv = document.getElementById('providerResult');
            
            if (!window.customerCoords) {
                resultDiv.innerHTML = '<div class="error">❌ Please test customer geocoding first</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="info">Testing provider distance calculation...</div>';
            
            // Simulate provider coordinates (real-time GPS)
            const providerCoords = {
                latitude: 28.45583245,
                longitude: 77.05713527
            };
            
            // Calculate distance
            const distance = calculateDistance(
                providerCoords.latitude, providerCoords.longitude,
                window.customerCoords.latitude, window.customerCoords.longitude
            );
            
            resultDiv.innerHTML = `
                <div class="success">
                    <h4>✅ Provider Distance Calculation</h4>
                    <p><strong>Provider Location:</strong> ${providerCoords.latitude}, ${providerCoords.longitude}</p>
                    <p><strong>Customer Location:</strong> ${window.customerCoords.latitude}, ${window.customerCoords.longitude}</p>
                    <p><strong>Calculated Distance:</strong> ${distance.toFixed(2)} km</p>
                    <p><strong>Display Name:</strong> ${window.customerCoords.display_name}</p>
                    <p><strong>This is what the provider should see!</strong></p>
                </div>
            `;
            
            console.log('📏 Distance calculation:', {
                provider: providerCoords,
                customer: window.customerCoords,
                distance: distance
            });
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in kilometers
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
    </script>
</body>
</html>
